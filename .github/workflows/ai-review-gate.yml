name: AI Review Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review-gate:
    uses: unstoppabledomains/agent-plugins/.github/workflows/ai-review-gate-reusable.yml@main
    secrets: inherit
